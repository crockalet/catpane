# Smithery configuration for CatPane MCP server.
# Allows AI agents to discover and run the logcat MCP server via `catpane mcp`.
# Install: brew install --cask catpane  (adds `catpane` CLI to PATH via binary symlink)
# See: https://smithery.ai/docs/build/quickstart
startCommand:
  type: stdio
  configSchema:
    type: object
    properties: {}
    additionalProperties: false
  commandFunction: |-
    (_config) => ({
      command: "catpane",
      args: ["mcp"],
      env: {
        PATH: `/Applications/CatPane.app/Contents/MacOS:${process.env.PATH ?? ""}`,
      },
    })
