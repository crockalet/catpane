name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to build and publish (for example v0.5.3)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-meta:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - id: meta
        env:
          RAW_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          release_tag="${RAW_TAG}"
          if [[ "${release_tag}" != v* ]]; then
            release_tag="v${release_tag}"
          fi
          # Anything with a SemVer pre-release suffix (e.g. v0.4.0-beta.1,
          # v0.4.0-alpha.2, v0.4.0-rc.1) is treated as a prerelease channel:
          # GitHub release marked prerelease, Homebrew publish goes to the
          # separate `catpane@beta` cask instead of the stable `catpane` cask.
          if [[ "${release_tag}" == *-* ]]; then
            prerelease=true
          else
            prerelease=false
          fi
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "version=${release_tag#v}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

  verify:
    runs-on: macos-14
    needs: release-meta
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Validate Cargo.toml version
        env:
          RELEASE_VERSION: ${{ needs.release-meta.outputs.version }}
        run: |
          python3 - <<'PY'
          import pathlib
          import tomllib
          import os
          cargo_version = tomllib.loads(pathlib.Path("catpane-cli/Cargo.toml").read_text())["package"]["version"]
          release_version = os.environ["RELEASE_VERSION"]
          if cargo_version != release_version:
              raise SystemExit(f"catpane-cli/Cargo.toml version {cargo_version} does not match release version {release_version}")
          PY
      - name: Run tests
        run: cargo test --workspace --quiet

  build-macos:
    needs: [release-meta, verify]
    runs-on: ${{ matrix.runner }}
    env:
      APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
      APPLE_EXTENSION_PROVISIONING_PROFILE: ${{ secrets.APPLE_EXTENSION_PROVISIONING_PROFILE }}
      APPLE_HOST_PROVISIONING_PROFILE: ${{ secrets.APPLE_HOST_PROVISIONING_PROFILE }}
      APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
      APPLE_NOTARY_API_KEY_P8: ${{ secrets.APPLE_NOTARY_API_KEY_P8 }}
      APPLE_NOTARY_ISSUER: ${{ secrets.APPLE_NOTARY_ISSUER }}
      APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      APPLE_SIGNING_CERTIFICATE_P12: ${{ secrets.APPLE_SIGNING_CERTIFICATE_P12 }}
      APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            target: aarch64-apple-darwin
            arch: arm64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            arch: x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Import Apple signing certificate
        if: ${{ env.APPLE_SIGNING_CERTIFICATE_P12 != '' && env.APPLE_SIGNING_CERTIFICATE_PASSWORD != '' && env.APPLE_KEYCHAIN_PASSWORD != '' && env.APPLE_CODESIGN_IDENTITY != '' }}
        run: |
          set -euo pipefail
          cert_path="$RUNNER_TEMP/catpane-signing.p12"
          keychain_path="$RUNNER_TEMP/catpane-signing.keychain-db"
          printf '%s' "$APPLE_SIGNING_CERTIFICATE_P12" | base64 --decode > "$cert_path"
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$cert_path" -k "$keychain_path" -P "$APPLE_SIGNING_CERTIFICATE_PASSWORD" -f pkcs12 -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')
          security default-keychain -d user -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$APPLE_KEYCHAIN_PASSWORD" "$keychain_path"
      - name: Write App Store Connect API key
        if: ${{ env.APPLE_NOTARY_KEY_ID != '' && env.APPLE_NOTARY_ISSUER != '' && env.APPLE_NOTARY_API_KEY_P8 != '' }}
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          printf '%s' "$APPLE_NOTARY_API_KEY_P8" | base64 --decode > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_NOTARY_KEY_PATH=$key_path" >> "$GITHUB_ENV"
      - name: Write provisioning profiles
        if: ${{ env.APPLE_HOST_PROVISIONING_PROFILE != '' && env.APPLE_EXTENSION_PROVISIONING_PROFILE != '' }}
        run: |
          set -euo pipefail
          host_profile="$RUNNER_TEMP/catpane-host.provisionprofile"
          extension_profile="$RUNNER_TEMP/catpane-extension.provisionprofile"
          printf '%s' "$APPLE_HOST_PROVISIONING_PROFILE" | base64 --decode > "$host_profile"
          printf '%s' "$APPLE_EXTENSION_PROVISIONING_PROFILE" | base64 --decode > "$extension_profile"
          echo "APPLE_HOST_PROVISIONING_PROFILE_PATH=$host_profile" >> "$GITHUB_ENV"
          echo "APPLE_EXTENSION_PROVISIONING_PROFILE_PATH=$extension_profile" >> "$GITHUB_ENV"
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Build Android helper APK
        run: scripts/build-helper-apk.sh
      - name: Package macOS app bundle
        env:
          RELEASE_VERSION: ${{ needs.release-meta.outputs.version }}
          TARGET_TRIPLE: ${{ matrix.target }}
          EXTENSION_PROVISIONING_PROFILE_PATH: ${{ env.APPLE_EXTENSION_PROVISIONING_PROFILE_PATH }}
          HOST_PROVISIONING_PROFILE_PATH: ${{ env.APPLE_HOST_PROVISIONING_PROFILE_PATH }}
          CODESIGN_IDENTITY: ${{ env.APPLE_CODESIGN_IDENTITY }}
        run: scripts/package-macos-app.sh
      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            dist/macos/${{ matrix.arch }}/*.zip
            dist/macos/${{ matrix.arch }}/*.sha256
          if-no-files-found: error

  publish-release:
    needs: [release-meta, build-macos]
    runs-on: ubuntu-latest
    env:
      CASK_NAME: ${{ needs.release-meta.outputs.prerelease == 'true' && 'catpane@beta' || 'catpane' }}
      CASK_OUTPUT_PATH: ${{ format('{0}/dist/artifacts/homebrew/Casks/{1}.rb', github.workspace, needs.release-meta.outputs.prerelease == 'true' && 'catpane@beta' || 'catpane') }}
      HOMEBREW_TAP_REPOSITORY: ${{ secrets.HOMEBREW_TAP_REPOSITORY }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      HOMEBREW_TAP_BRANCH: ${{ secrets.HOMEBREW_TAP_BRANCH }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
      - name: Render Homebrew cask
        env:
          CASK_NAME: ${{ env.CASK_NAME }}
          DIST_DIR: ${{ github.workspace }}/dist/artifacts
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_VERSION: ${{ needs.release-meta.outputs.version }}
        run: scripts/render-homebrew-cask.sh
      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-meta.outputs.release_tag }}
          PRERELEASE: ${{ needs.release-meta.outputs.prerelease }}
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          assets=(
            dist/artifacts/**/*.zip
            dist/artifacts/**/*.sha256
            "$CASK_OUTPUT_PATH"
          )
          if [[ "$PRERELEASE" == "true" ]]; then
            create_flags=(--prerelease)
          else
            create_flags=(--latest)
          fi
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" "${create_flags[@]}" --generate-notes --title "$RELEASE_TAG"
          fi
      - name: Publish Homebrew tap
        if: ${{ env.HOMEBREW_TAP_REPOSITORY != '' && env.HOMEBREW_TAP_TOKEN != '' }}
        env:
          CASK_NAME: ${{ env.CASK_NAME }}
          CASK_SOURCE: ${{ env.CASK_OUTPUT_PATH }}
          RELEASE_VERSION: ${{ needs.release-meta.outputs.version }}
        run: scripts/publish-homebrew-tap.sh
